<!-- 跳转按钮样式 (需放在<head>标签内) -->
<style>
    .nav-arrow {
        position: fixed;
        top: 50%;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background-color: rgba(34, 197, 94, 0.4); /* 40%透明度的主色调 */
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        text-decoration: none;
        transition: all 0.3s ease;
        z-index: 40; /* 确保在内容上方但不遮挡导航栏 */
        transform: translateY(-50%);
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .nav-arrow:hover {
        background-color: rgba(34, 197, 94, 0.8); /* 悬停时80%透明度 */
        transform: translateY(-50%) scale(1.1); /* 悬停时轻微放大 */
    }
    
    .nav-arrow-left {
        left: 16px;
    }
    
    .nav-arrow-right {
        right: 16px;
    }
</style>

<!-- 引入Font Awesome图标库 (需放在<head>标签内) -->
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
